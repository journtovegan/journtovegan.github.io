
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Journey to Vegan</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Quicksand:wght@400;500&family=Raleway:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <h1><span class="journey">Journey</span> <span class="vegan">to Vegan</span></h1>
    <nav>
      <button onclick="window.location.href='index.html'">Home</button>
      <button onclick="window.location.href='why-vegan.html'">Why Vegan?</button>
      <button onclick="window.location.href='swaps.html'">Sustainable Swaps</button>
      <button onclick="window.location.href='gear.html'">Gear Guides</button>
      <button onclick="window.location.href='contact.html'">Contact</button>
    </nav>
  </header>

  <section class="intro">
    <h2>Contact Me</h2>
    <p>
      Did I get something wrong? Please let me know!
      Have questions or want to get in touch?
      I’d love to hear from you. Send a message below.
    </p>
  </section>

  <section class="contact-form">
    <form action="https://formspree.io/f/mdalrdqy" method="post">
      <label for="name">Name</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="email">Email</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="message">Message</label><br>
      <textarea id="message" name="message" rows="6" required></textarea><br><br>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p> Follow me on Instagram: @Journeyto.Vegan&nbsp;&nbsp;|&nbsp;&nbsp;Email: journto.vegan@gmail.com</p>
  </footer>

</body>
</html>
