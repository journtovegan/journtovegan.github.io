  </header>

  <section class="intro">
    <h2>Contact Me</h2>
    <p>
      Did I get something wrong? Please let me know!<br>
      Have questions or want to get in touch?<br>
      I’d love to hear from you. Send a message below.
    </p>
  </section>

  <section class="contact-form">
    <form action="https://formspree.io/f/mdalrdqy" method="post">
      <label for="name">Name</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="email">Email</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="message">Message</label><br>
      <textarea id="message" name="message" rows="6" required></textarea><br><br>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p> Follow me on Instagram: @Journeyto.Vegan&nbsp;&nbsp;|&nbsp;&nbsp;Email: journto.vegan@gmail.com</p>
